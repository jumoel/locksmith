# Fixture shape modeled after pnpm v10 documentation:
# https://pnpm.io/settings - covers every resolution-relevant key.
packages:
  - 'packages/*'
  - 'apps/*'

catalog:
  react: ^18.3.0
  react-dom: ^18.3.0

catalogs:
  react17:
    react: ^17.0.0
    react-dom: ^17.0.0

resolutionMode: time-based
autoInstallPeers: false
strictPeerDependencies: true
dedupePeerDependents: false

catalogMode: prefer

minimumReleaseAge: 86400
minimumReleaseAgeExclude:
  - "@types/node"
  - "typescript"

supportedArchitectures:
  os:
    - linux
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
    - musl

packageExtensions:
  "react@*":
    peerDependencies:
      "react-dom": "*"

overrides:
  lodash: "^4.17.21"

allowedDeprecatedVersions:
  request: "^2.0.0"
