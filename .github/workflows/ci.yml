name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -count=1 -short ./...

  generation-tests:
    name: Generation tests (real registry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -count=1 -timeout 10m ./testharness/

  correctness-tests:
    name: "Correctness: ${{ matrix.group }}"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        group:
          - npm@2-shrinkwrap
          - npm@3-shrinkwrap
          - npm@4-shrinkwrap
          - npm@5-shrinkwrap
          - npm@6-shrinkwrap
          - npm@5-v1
          - npm@6-v1
          - npm@7-v2
          - npm@8-v2
          - npm@7-v3
          - npm@8-v3
          - npm@9-v3
          - npm@10-v3
          - npm@11-v3
          - pnpm@4-v5.1
          - pnpm@5-v5.2
          - pnpm@6-v5.3
          - pnpm@7-v5.4
          - pnpm@8-v6
          - pnpm@9-v9
          - pnpm@10-v9
          - yarn@1
          - yarn@2-v4
          - yarn@3.1-v5
          - yarn@3-v6
          - yarn@4-v8
          - bun
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Docker test runner
        run: docker build --platform linux/amd64 -t locksmith-test-runner testharness/
      - name: Run correctness tests
        run: >
          go test -tags integration -count=1 -timeout 25m
          -run "TestCorrectness/${{ matrix.group }}"
          ./testharness/ -v

  workspace-tests:
    name: Workspace acceptance
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Docker test runner
        run: docker build --platform linux/amd64 -t locksmith-test-runner testharness/
      - name: Run workspace acceptance tests
        run: >
          go test -tags integration -count=1 -timeout 12m
          -run "TestWorkspaceAcceptance"
          ./testharness/ -v

  acceptance-tests:
    name: "Acceptance: ${{ matrix.group }}"
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        group:
          # npm shrinkwrap: split into old (2, 5, 6) and new (7-11) to stay under timeout
          - npm-shrinkwrap/npm@2
          - npm-shrinkwrap/npm@5
          - npm-shrinkwrap/npm@6
          - npm-shrinkwrap/npm@7
          - npm-shrinkwrap/npm@8
          - npm-shrinkwrap/npm@9
          - npm-shrinkwrap/npm@10
          - npm-shrinkwrap/npm@11
          # package-lock v1-v3: split into per-version jobs
          - package-lock-v1/npm@6
          - package-lock-v1/npm@7
          - package-lock-v1/npm@8
          - package-lock-v1/npm@9
          - package-lock-v1/npm@10
          - package-lock-v1/npm@11
          - package-lock-v2/npm@7
          - package-lock-v2/npm@8
          - package-lock-v2/npm@9
          - package-lock-v2/npm@10
          - package-lock-v2/npm@11
          - package-lock-v3/npm@7
          - package-lock-v3/npm@8
          - package-lock-v3/npm@9
          - package-lock-v3/npm@10
          - package-lock-v3/npm@11
          # pnpm
          - pnpm-lock-v4/pnpm@4
          - pnpm-lock-v5/pnpm@5
          - pnpm-lock-v5/pnpm@6
          - pnpm-lock-v5/pnpm@7
          - pnpm-lock-v6/pnpm@8
          - pnpm-lock-v9/pnpm@9
          - pnpm-lock-v9/pnpm@10
          # yarn
          - yarn-classic/yarn@1
          - yarn-berry-v4/yarn@2
          - yarn-berry-v5/yarn@3.1
          - yarn-berry-v6/yarn@3
          - yarn-berry-v8/yarn@4
          # bun
          - bun-lock/bun@latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Docker test runner
        run: docker build --platform linux/amd64 -t locksmith-test-runner testharness/
      - name: Run acceptance tests
        run: >
          go test -tags integration -count=1 -timeout 12m
          -run "TestIntegration/${{ matrix.group }}"
          ./testharness/ -v
